<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table in html </title>
</head>
<body>
    <table border="" align="centre">
        <caption>Sample Table</caption>
        <thead>
            <colgroup>
                <col style="background-color: purple;">
                <col style="background-color: lightblue;">
                <col style="background-color: lightgreen;">
            </colgroup>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
        </thead>
        
         <tbody>  
        <tr>
            <td rowspan="2">john Doe</td>
            <td>30</td>
            <td>New York</td>
        </tr>
        <tr>
            <td colspan="2">25</td>
            <td>Jane Smith</td>
            <td>Los Angeles</td>
        </tr>
        <tr>
            <td>Emily Johnson</td>
            <td>35</td>
            <td>Chicago</td>
        </tr>
         </tbody>
         <tfoot>
            <tr>
                <td colspan="3">End of Table </td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
